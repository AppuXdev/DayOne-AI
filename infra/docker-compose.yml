version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dayone-postgres
    environment:
      POSTGRES_USER: dayone
      POSTGRES_PASSWORD: dayone
      POSTGRES_DB: dayone
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../scripts/init_db.psql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dayone -d dayone"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: dayone-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: dayone-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: dayone-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password;
      mc mb -p local/dayone-docs || true;
      exit 0;
      "

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: dayone-backend
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://dayone:dayone@postgres:5432/dayone
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: password
      MINIO_BUCKET: dayone-docs
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  frontend:
    image: node:20
    container_name: dayone-frontend
    working_dir: /app
    command: sh -c "npm install ; npm run dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ..:/app
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
