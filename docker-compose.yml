version: "3.9"

services:
  dayone-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dayone-ai
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped
